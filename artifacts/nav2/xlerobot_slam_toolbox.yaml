slam_toolbox:
  ros__parameters:
    use_sim_time: true
    slam_mode: mapping
    mode: mapping
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    transform_publish_period: 0.05
    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 10.0
    minimum_time_interval: 0.1
    throttle_scans: 1
    queue_size: 50
    enable_interactive_mode: true
    debug_logging: false
