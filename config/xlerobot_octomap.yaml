octomap_server:
  ros__parameters:
    # Navigation runs use map so /projected_map can feed Nav2's global costmap.
    # TF must provide map -> odom -> base_link before starting OctoMap.
    frame_id: map
    base_frame_id: base_link
    resolution: 0.08

    # Keep this near the reliable Gemini 2 indoor range while validating.
    sensor_model.max_range: 5.0

    # Input cloud crop before insertion. Use z in the fixed frame.
    pointcloud_min_z: 0.12
    pointcloud_max_z: 1.50

    # Height band used for the projected 2D map. The 3D octree still stores
    # occupied/free evidence; this controls what becomes navigation-relevant.
    occupancy_min_z: 0.12
    occupancy_max_z: 1.50

    filter_ground_plane: true
    ground_filter.distance: 0.08
    ground_filter.angle: 0.20
    ground_filter.plane_distance: 0.12

    filter_speckles: true
    publish_free_space: true
    latch: true
    # Keep false for the exploration UI: /projected_map should be a full
    # accumulated projection, while /projected_map_updates carries RViz-style patches.
    incremental_2D_projection: false
    compress_map: true

    sensor_model.hit: 0.65
    sensor_model.miss: 0.45
    sensor_model.min: 0.12
    sensor_model.max: 0.90
